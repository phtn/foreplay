<svg id="noice">
    <filter id="noise-filter">
        <feTurbulence type="fractalNoise" baseFrequency="1" numOctaves="5" stitchTiles="stitch"></feTurbulence>
        <feColorMatrix type="saturate" values="0"></feColorMatrix>
        <feComponentTransfer>
            <feFuncR type="linear" slope="0.5"></feFuncR>
            <feFuncG type="linear" slope="0.5"></feFuncG>
            <feFuncB type="linear" slope="0.5"></feFuncB>
            <feFuncA type="linear" slope="0.5"></feFuncA>
        </feComponentTransfer>
        <feComponentTransfer>
            <feFuncR type="linear" slope="1.5" intercept="-0.25"/>
            <feFuncG type="linear" slope="1.5" intercept="-0.25"/>
            <feFuncB type="linear" slope="1.5" intercept="-0.25"/>
        </feComponentTransfer>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise-filter)"></rect>
</svg>
